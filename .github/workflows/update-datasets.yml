name: Update CSV datasets and Pages

on:
  workflow_dispatch:
    inputs:
      scope:
        description: "Dataset range: recent5 or all"
        required: true
        default: "recent5"
        type: choice
        options:
          - recent5
          - all
  schedule:
    # 21:15 UTC = 06:15 KST, so yesterday data is ready before school starts
    - cron: "15 21 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Update datasets
        run: python scripts/update_datasets.py --scope "${{ github.event.inputs.scope || 'recent5' }}"
      - name: Generate GitHub Pages
        run: python scripts/generate_pages.py
      - name: Validate datasets and pages
        run: python scripts/validate_datasets.py
      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(data): update CSV datasets and pages"
          file_pattern: data/*.csv data/manifest.json docs/**
