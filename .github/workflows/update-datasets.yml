name: Update CSV datasets

on:
  workflow_dispatch:
  schedule:
    # 22:00 UTC = 07:00 KST
    - cron: "0 22 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Update datasets
        run: python scripts/update_datasets.py
      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(data): update CSV datasets"
          file_pattern: data/*.csv data/manifest.json
